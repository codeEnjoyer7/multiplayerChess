<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Multiplayer Chess!1</h1>


        <h2>Play with a friend</h2>

    <label for="createRoomInput">Click Create Room for a code you can share with your friend.</label>
    <input name="createRoomInput" id="createRoomInput" type="submit" value="Create Room" onclick="CreateRoom()">
    <p id="roomIdInformer"></p>

    <label for="roomCode">To join a friends game, enter the code they give you.</label>
    <input type="text" id="roomCode" name="roomCode">
    <input type="submit" value="Join Room" onclick="JoinRoom()">
    <p id="inputtedCodeInformer"></p>

    <canvas id="chessBoard" width="512px", height="512px" style="border:3px solid"></canvas>

</body>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    function CreateRoom(){
        socket.emit('CreateRoom', socket.id);
    }

    function JoinRoom(){
        roomId = document.getElementById("roomCode").value;
        socket.emit('JoinRoom', {joinerId: socket.id, roomId: roomId});
    }

    socket.on('returnRoomId', (roomId) => {
        document.getElementById("roomIdInformer").innerText="Room successfully created! Your room code is: "+roomId;
    });

    socket.on('returnJoinResult', (isCorrectCode) =>{
        if(isCorrectCode){
            document.getElementById("inputtedCodeInformer").innerText="Success!";
        }
        else{
            document.getElementById("inputtedCodeInformer").innerText="Sorry, there is no available room that has that code.";
        }
    });
    
    socket.on('ReturnBoard', (data) => {
    console.log("Room: ", data.room);
    console.log("Team Number:", data.team); // Receives 1 or 2
    console.log("Is My Turn:", data.isMyTurn);      // Receives true or false
    console.log("Board String:", data.stringBoard); // Receives the FEN string
    let room = data.room;
    let stringBoard = data.stringBoard;
    let assignedTeam=data.team;
    let isMyTurn = data.isMyTurn;
        let c = document.getElementById("chessBoard")
        let ctx = c.getContext("2d");
        const sprites = new Image();
        sprites.src="betterSpriteSheet.png"
        sprites.onload= () => {

        class King{
            constructor(team, tile){
                this.team=team;
                this.tile=tile;
                this.symbol="k"
            }
            getTeam(){
                return this.team;
            }
            drawSelf(ctx, sprites){
                if(this.team==1){
                    ctx.drawImage(sprites,-5,-5,151,155,(this.tile% 8)*64,Math.floor(this.tile/8)*64,64,64); //white king
                }
                else if(this.team==2){
                    ctx.drawImage(sprites,-5,161,151,155,(this.tile% 8)*64,Math.floor(this.tile/8)*64,64,64); //black king
                }
                console.log(this.tile);
            }
        }

        class Queen{
            constructor(team, tile){
                this.team=team;
                this.tile=tile;
                this.symbol="q"
            }
            getTeam(){
                return this.team;
            }
            drawSelf(ctx, sprites){
                if(this.team==1){
                    ctx.drawImage(sprites,161,-5,161,155,(this.tile% 8)*64,Math.floor(this.tile/8)*64,64,64); //white queen
                }
                else if(this.team==2){
                    ctx.drawImage(sprites,161,165,161,155,(this.tile% 8)*64,Math.floor(this.tile/8)*64,64,64); //black queen
                }
            }
        }

        class Bishop{
            constructor(team, tile){
                this.team=team;
                this.tile=tile;
                this.symbol="b"
            }

            drawSelf(ctx, sprites){
                if(this.team==1){
                    ctx.drawImage(sprites,327,-5,161,155,(this.tile% 8)*64,Math.floor(this.tile/8)*64,64,64); //white bishop
                }
                else if(this.team==2){
                    ctx.drawImage(sprites,327,165,161,155,(this.tile% 8)*64,Math.floor(this.tile/8)*64,64,64); //black bishop
                }
            }
        }

        class Knight{
            constructor(team, tile){
                this.team=team;
                this.tile=tile;
                this.symbol="n"
            }

            drawSelf(ctx, sprites){
                if(this.team==1){
                    ctx.drawImage(sprites,497,-5,161,155,(this.tile% 8)*64,Math.floor(this.tile/8)*64,64,64); //white pawn
                }
                else if(this.team==2){
                    ctx.drawImage(sprites,497,165,161,155,(this.tile% 8)*64,Math.floor(this.tile/8)*64,64,64); //black pawn
                }
            }
        }

        class Rook{
            constructor(team, tile,){
                this.team=team;
                this.tile=tile;
                this.symbol="r"
            }

            drawSelf(ctx, sprites){
                if(this.team==1){
                    ctx.drawImage(sprites,669,-5,161,155,(this.tile% 8)*64,Math.floor(this.tile/8)*64,64,64); //white pawn
                }
                else if(this.team==2){
                    ctx.drawImage(sprites,669,165,161,155,(this.tile% 8)*64,Math.floor(this.tile/8)*64,64,64); //black pawn
                }
            }

        }


        class Pawn{
            constructor(team, tile){
                this.team=team;
                this.tile=tile;
                this.symbol="p";
                this.hasMoved=false;
            }

            drawSelf(ctx, sprites){
                if(this.team==1){
                    ctx.drawImage(sprites,837,-5,161,155,(this.tile% 8)*64,Math.floor(this.tile/8)*64,64,64); //white pawn
                }
                else if(this.team==2){
                    ctx.drawImage(sprites,837,165,161,155,(this.tile% 8)*64,Math.floor(this.tile/8)*64,64,64); //black pawn
                }
            }

            getMoves(board){
                let availableMoves=[]
                if(board[this.tile-8]==null){
                    availableMoves.push(this.tile-8)
                    if(board[this.tile-16]==null && this.hasMoved==false){
                        availableMoves.push(this.tile-16)
                    }
                }
                return availableMoves;
                //board[this.tile-8] = this;
                //board[this.tile] = null;
                //let r = Math.floor(this.tile /8);
                //let c = this.tile % 8;
                //ctx.fillStyle = colors[(r+c) & 1];
                //ctx.fillRect(c*64, r*64, 64, 64);
                //this.tile = this.tile-8;
                //this.drawSelf(ctx, sprites);
            }

        }
        
        //TODO: convert FEN string back to array of chess pieces

        const PIECE_CLASSES = {
            'p' : Pawn,
            'n' : Knight,
            'b' : Bishop,
            'r': Rook,
            'q' : Queen,
            'k' : King
        }

        let stringBoardNoSlashes = stringBoard.replaceAll("/", "")
        let objectBoard =[];
        let tile=0;
        for (const char of stringBoardNoSlashes) {
            if (/\d/.test(char)) { // checks if the character is a number
                for(let i=0; i<Number(char); i++){
                    objectBoard.push(null);
                }
                tile+=Number(char)
            }
            else{ //if the character is a symbol
                const isWhite = char === char.toUpperCase()
                const PieceClass = PIECE_CLASSES[char.toLowerCase()];
                if (PieceClass){
                    let piece;
                    if(assignedTeam==1){
                        piece = new PieceClass(isWhite ? 2 : 1, tile);
                    }
                    else{
                        piece = new PieceClass(isWhite ? 2 : 1, 63-tile);
                    }
                    objectBoard.push(piece);
                    tile+=1;
                }
            }
        }
        if(assignedTeam==2){
            objectBoard.reverse();
        }


        const colors = ["#eeeed2", "#769656"]; // Clean hex codes
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                ctx.fillStyle = colors[(r + c) & 1];
                ctx.fillRect(c*64, r*64, 64, 64);
                }
        }
        let currentlySelectedPiece;
        //MOVEMENT LOGIC START -------------------------------------------------------------------------
        c.addEventListener('click', function(event) { // runs code if the canvas (chess board) is clicked
            const rect = c.getBoundingClientRect()
            let availableMoves;
            let proposedTile=objectBoard[(((event.clientX-rect.left)-(event.clientX-rect.left)%64)+((event.clientY-rect.top)-(event.clientY-rect.top)%64)*8)/64]; //stores the tile that was clicked
            console.log("CURRENTLY SELECTED:", currentlySelectedPiece)
            console.log("PROPOSED: ", proposedTile);
            if(currentlySelectedPiece!=null){ //if statement checks if a piece is already selected, if yes, it unhighlights the tile and redraws the piece, and recolors the previous availableMoves tiles back to normal
                let index = currentlySelectedPiece.tile;
                let r = Math.floor(index /8);
                let c = index % 8;
                ctx.fillStyle = colors[(r + c) & 1];
                ctx.fillRect(c*64,r*64,64,64)
                currentlySelectedPiece.drawSelf(ctx, sprites);
                availableMoves=currentlySelectedPiece.getMoves(objectBoard);
                    for(let i=0; i<availableMoves.length; i++){
                        let tile = availableMoves[i];
                        let r = Math.floor(tile /8);
                        let c = tile % 8;
                        ctx.fillStyle = colors[(r + c) & 1];
                        ctx.fillRect(c*64,r*64,64,64)
                        if ((((event.clientX-rect.left)-(event.clientX-rect.left)%64)+((event.clientY-rect.top)-(event.clientY-rect.top)%64)*8)/64==tile){
                            console.log("requesting room: ",room, "to move: ", currentlySelectedPiece.tile, "to: ", tile);
                            socket.emit('requestMove', {room: room, fromTile: currentlySelectedPiece.tile, toTile: tile});
                            
                        }
                    }
            }



            if(isMyTurn==true && proposedTile!=null && proposedTile.team == assignedTeam){ //if it the players turn, they click a piece that is part of their team.
                ctx.fillStyle = "#baca44"
                ctx.fillRect((proposedTile.tile%8)*64,Math.floor(proposedTile.tile/8)*64,64,64);
                proposedTile.drawSelf(ctx, sprites);
                
                currentlySelectedPiece=proposedTile; //stores the tile that was clicked as the currently selected piece
                console.log(proposedTile.getMoves(objectBoard));
                availableMoves=proposedTile.getMoves(objectBoard);
                for(let i=0; i<availableMoves.length; i++){
                    let tile=availableMoves[i];
                    console.log(tile);
                    let r = Math.floor(tile /8);
                    let c = tile % 8;
                    ctx.fillStyle="#660000";
                    ctx.fillRect(c*64,r*64,64,64);
                    
                }

            }
        })
        //MOVEMENT LOGIC END ----------------------------------------------------
        for(let i=0; i< objectBoard.length; i++){
            if(objectBoard[i]!=null){
                objectBoard[i].drawSelf(ctx, sprites);
            }
        }
        }

    });

</script>
<script src="gameLogic.js"></script>

</html>

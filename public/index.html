<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Multiplayer Chess!1</h1>


        <h2>Play with a friend</h2>

    <label for="createRoomInput">Click Create Room for a code you can share with your friend.</label>
    <input name="createRoomInput" id="createRoomInput" type="submit" value="Create Room" onclick="CreateRoom()">
    <p id="roomIdInformer"></p>

    <label for="roomCode">To join a friends game, enter the code they give you.</label>
    <input type="text" id="roomCode" name="roomCode">
    <input type="submit" value="Join Room" onclick="JoinRoom()">
    <p id="inputtedCodeInformer"></p>

    <canvas id="chessBoard" width="512px", height="512px" style="border:3px solid"></canvas>

</body>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    
    function CreateRoom(){
        socket.emit('CreateRoom', socket.id);
    }

    function JoinRoom(){
        roomId = document.getElementById("roomCode").value;
        socket.emit('JoinRoom', {joinerId: socket.id, roomId: roomId});
    }

    socket.on('returnRoomId', (roomId) => {
        document.getElementById("roomIdInformer").innerText="Room successfully created! Your room code is: "+roomId;
    });

    socket.on('returnJoinResult', (isCorrectCode) =>{
        if(isCorrectCode){
            document.getElementById("inputtedCodeInformer").innerText="Success!";
        }
        else{
            document.getElementById("inputtedCodeInformer").innerText="Sorry, there is no available room that has that code.";
        }
    });
    
    socket.on('ReturnBoard', (assignedTeam, stringBoard) => {

        let c = document.getElementById("chessBoard")
        let ctx = c.getContext("2d");
        const sprites = new Image();
        sprites.src="betterSpriteSheet.png"

        const colors = ["#eeeed2", "#769656"]; // Clean hex codes
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                ctx.fillStyle = colors[(r + c) & 1];
                ctx.fillRect(c*64, r*64, 64, 64);
                }
        }

        class King{
            constructor(team, tile){
                this.team=team;
                this.tile=tile;
                this.symbol="k"
            }
            getTeam(){
                return this.team;
            }
            drawSelf(){
                if(this.team==1){
                    ctx.drawImage(sprites,-5,-5,151,155,this.c*64,this.r*64,64,64); //white king
                }
                else if(this.team==2){
                    ctx.drawImage(sprites,-5,161,151,155,this.c*64,this.r*64,64,64); //black king
                }
            }
        }

        class Queen{
            constructor(team, tile){
                this.team=team;
                this.tile=tile;
                this.symbol="q"
            }
            getTeam(){
                return this.team;
            }
            drawSelf(){
                if(this.team==1){
                    ctx.drawImage(sprites,161,-5,161,155,this.c*64,this.r*64,64,64); //white queen
                }
                else if(this.team==2){
                    ctx.drawImage(sprites,161,165,161,155,this.c*64,this.r*64,64,64); //black queen
                }
            }
        }

        class Bishop{
            constructor(team, tile){
                this.team=team;
                this.tile=tile;
                this.symbol="b"
            }
            getTeam(){
                return this.team;
            }
            drawSelf(){
                if(this.team==1){
                    ctx.drawImage(sprites,327,-5,161,155,this.c*64,this.r*64,64,64); //white bishop
                }
                else if(this.team==2){
                    ctx.drawImage(sprites,327,165,161,155,this.c*64,this.r*64,64,64); //black bishop
                }
            }
        }

        class Knight{
            constructor(team, tile){
                this.team=team;
                this.tile=tile;
                this.symbol="n"
            }
            getTeam(){
                return this.team;
            }
            drawSelf(){
                if(this.team==1){
                    ctx.drawImage(sprites,497,-5,161,155,this.c*64,this.r*64,64,64); //white pawn
                }
                else if(this.team==2){
                    ctx.drawImage(sprites,497,165,161,155,this.c*64,this.r*64,64,64); //black pawn
                }
            }
        }

        class Rook{
            constructor(team, tile,){
                this.team=team;
                this.tile=tile;
                this.symbol="r"
            }
            getTeam(){
                return this.team;
            }
            drawSelf(){
                if(this.team==1){
                    ctx.drawImage(sprites,669,-5,161,155,this.c*64,this.r*64,64,64); //white pawn
                }
                else if(this.team==2){
                    ctx.drawImage(sprites,669,165,161,155,this.c*64,this.r*64,64,64); //black pawn
                }
            }
        }


        class Pawn{
            constructor(team, tile){
                this.team=team;
                this.tile=tile;
                this.symbol="p";
            }

            getTeam(){
                return this.team;
            }

            drawSelf(){
                if(this.team==1){
                    ctx.drawImage(sprites,837,-5,161,155,this.c*64,this.r*64,64,64); //white pawn
                }
                else if(this.team==2){
                    ctx.drawImage(sprites,837,165,161,155,this.c*64,this.r*64,64,64); //black pawn
                }
            }
        }
        
        //TODO: convert FEN string back to array of chess pieces

        const PIECE_CLASSES = {
            'p' : Pawn,
            'n' : Knight,
            'b' : Bishop,
            'r': Rook,
            'q' : Queen,
            'k' : King
        }

        let stringBoardNoSlashes = stringBoard.replaceAll("/", "")
        let objectBoard =[];
        let tile=0;
        for (const char of stringBoardNoSlashes) {
            if (/\d/.test(char)) { // checks if the character is a number
                for(let i=0; i<Number(char); i++){
                    objectBoard.push(null);
                }
                tile+=Number(char)
            }
            else{ //if the character is a symbol
                const isWhite = char === char.toUpperCase()
                const PieceClass = PIECE_CLASSES[char.toLowerCase()];
                if (PieceClass){
                    objectBoard.push(new PieceClass(isWhite ? 1 : 2, tile));
                    tile+=1;
                }
            }
        }
        console.log(objectBoard);

    });

</script>
<script src="gameLogic.js"></script>

</html>

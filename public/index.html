<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Multiplayer Chess!1</h1>


        <h2>Play with a friend</h2>

    <label for="createRoomInput">Click Create Room for a code you can share with your friend.</label>
    <input name="createRoomInput" type="submit" value="Create Room" onclick="CreateRoom()">
    <p id="roomIdInformer"></p>

    <label for="roomCode">To join a friends game, enter the code they give you.</label>
    <input type="text" id="roomCode" name="roomCode">
    <input type="submit" value="Join Room" onclick="JoinRoom()">
    <p id="inputtedCodeInformer"></p>

    <canvas id="chessBoard" width="512px", height="512px" style="border:3px solid"></canvas>

</body>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    
    function CreateRoom(){
        socket.emit('CreateRoom', socket.id);
    }

    function JoinRoom(){
        roomId = document.getElementById("roomCode").value;
        socket.emit('JoinRoom', {joinerId: socket.id, roomId: roomId});
    }

    socket.on('returnRoomId', (roomId) => {
        document.getElementById("roomIdInformer").innerText="Room successfully created! Your room code is: "+roomId;
    });

    socket.on('returnJoinResult', (isCorrectCode) =>{
        if(isCorrectCode){
            document.getElementById("inputtedCodeInformer").innerText="Success!";
        }
        else{
            document.getElementById("inputtedCodeInformer").innerText="Sorry, there is no available room that has that code.";
        }
    });

</script>
<script src="gameLogic.js"></script>

</html>
